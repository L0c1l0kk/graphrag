name: graphrag
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.2.0
  - torchvision
  - pytorch-cuda=12.1
  - pip
  - pip:
    # NER
    - gliner>=0.2.13

    # Graph construction & clustering
    - igraph>=0.11.6         # efficient graph representation and algorithms

    # LLM inference (local, via Ollama REST API)
    - ollama>=0.2.0          # Python client for the Ollama server

    # Embeddings & vector store
    - sentence-transformers>=3.0.0
    - chromadb>=0.5.0
    - flagembedding
    - faiss

    # Data handling & utilities
    - datasets>=2.20.0       # for loading HuggingFace datasets (e.g. Wikipedia)
    - pandas>=2.2.0
    - tqdm>=4.66.0
    - numpy>=1.26.0
    - scikit-learn>=1.5.0    # cosine similarity for deduplication
    - polars
    - psutil
    - duckdb

    # Serialization / checkpointing
    - orjson>=3.10.0         # fast JSON; used for checkpoint files
    
    #testing
    - pytest